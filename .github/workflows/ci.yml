name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install "ruff>=0.8"

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Tests (unit + integration)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tgbot_test
          POSTGRES_USER: tgbot
          POSTGRES_PASSWORD: tgbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tgbot -d tgbot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Dummy values — tests mock external APIs
      BOT_TOKEN: "0000000000:AAFakeTokenForCIAAAAAAAAAAAAAAAAAAAA"
      ANTHROPIC_API_KEY: "sk-fake-anthropic-key"
      OPENAI_API_KEY: "sk-fake-openai-key"
      TELEGRAM_CHANNEL_ID: "-1001234567890"
      DATABASE_URL: "postgresql+asyncpg://tgbot:tgbot@localhost:5432/tgbot_test"
      TEST_DATABASE_URL: "postgresql+asyncpg://tgbot:tgbot@localhost:5432/tgbot_test"
      OWNER_IDS: "123456"
      LOG_LEVEL: "DEBUG"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v

      - name: Run integration tests
        run: pytest tests/integration/ -v
